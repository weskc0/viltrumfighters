<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stick Viltrumite Arena</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="gameCanvas" width="1200" height="600"></canvas>
  <div id="ui">
    <div id="menuOverlay" class="overlay hidden">
      <h1 id="title">STICK VILTRUMITE ARENA</h1>
      <div class="menuButtons">
        <button id="btnFight" class="menuBtn">FIGHT</button>
        <button id="btnEndless" class="menuBtn locked" title="Beat Thragg to unlock">ENDLESS</button>
        <button id="btnAbilities" class="menuBtn">ABILITIES</button>
        <button id="btnQuit" class="menuBtn">QUIT</button>
      </div>
      <p class="hint">WASD Move | Mouse Aim/Punch | Space Jump | 1-8 Powers</p>
    </div>

    <div id="abilitiesOverlay" class="overlay hidden">
      <h2>Unlocked Abilities</h2>
      <div id="abilitiesList"></div>
      <button id="closeAbilities" class="menuBtn">Back</button>
    </div>

    <div id="victoryOverlay" class="overlay hidden">
      <h2 id="victoryText"></h2>
      <button id="toMenu" class="menuBtn">Main Menu</button>
    </div>

    <div id="hud">
      <div id="kills">Kills: 0</div>
      <div id="healthBar"><div id="hpFill"></div></div>
      <div id="cooldowns"></div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
