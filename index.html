<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container">
        <canvas id="game-canvas"></canvas>
        <div id="ui">
            <!-- Player Stats -->
            <div id="player-stats" class="stat-box" style="display: none;">
                <div><span class="stat-label">PLAYER</span></div>
                <div class="health-bar">
                    <div class="health-fill" id="player-health"></div>
                </div>
                <div><span class="stat-value" id="player-hp">100/100</span></div>
                <div style="margin-top: 8px; color: #888; font-size: 11px;">
                    <div>DMG: <span id="player-dmg">1-2</span></div>
                    <div>LVL: <span id="player-level">1</span></div>
                </div>
            </div>

            <!-- Enemy Stats -->
            <div id="enemy-stats" class="stat-box" style="display: none;">
                <div><span class="stat-label">ENEMY</span></div>
                <div class="health-bar">
                    <div class="health-fill" id="enemy-health"></div>
                </div>
                <div><span class="stat-value" id="enemy-hp">0/0</span></div>
            </div>

            <!-- Boss Stats -->
            <div id="boss-stats" class="stat-box" style="display: none;">
                <div style="color: #ff4444; font-weight: bold; font-size: 14px;">⚠ THRAGG - WARLORD ⚠</div>
                <div class="boss-health-bar">
                    <div class="boss-health-fill" id="boss-health"></div>
                </div>
                <div><span class="stat-value" id="boss-hp">0/0</span></div>
                <div style="margin-top: 8px; color: #ff6666; font-size: 10px;">
                    PHASE: <span id="boss-phase">1</span>
                </div>
            </div>

            <!-- Wave Info -->
            <div id="wave-info" class="stat-box" style="display: none;">
                <div style="color: #ff006e; font-size: 12px;">ENEMIES DEFEATED</div>
                <div id="kills-display" style="font-size: 28px; margin-top: 4px; color: #00ff88;">0</div>
            </div>

            <!-- Endless Wave Info -->
            <div id="wave-endless-info" class="stat-box" style="display: none;">
                <div style="color: #ff006e; font-weight: bold;">WAVE <span id="wave-number">1</span></div>
                <div style="color: #00ff88;">Score: <span id="endless-score">0</span></div>
            </div>

            <!-- Abilities -->
            <div id="abilities" style="display: none;">
                <div style="color: #888; font-size: 11px; margin-bottom: 8px; text-align: center;">ABILITIES (Q-I)</div>
                <div id="ability-slots"></div>
            </div>

            <!-- Controls -->
            <div id="instructions" style="display: none;">
                <div style="color: #00ff88; font-weight: bold; margin-bottom: 8px;">CONTROLS</div>
                <div>Arrow Keys: Move</div>
                <div>Space: Jump</div>
                <div>Q-I: Abilities</div>
                <div>P: Pause</div>
            </div>

            <!-- Menu Buttons -->
            <div id="menu-buttons" style="display: none;">
                <div id="menu-title">⚔ STICK VILTRUMITE ARENA ⚔</div>
                <button class="menu-btn" onclick="window.gameManager.startCampaign()">
                    <span class="menu-btn-icon">👊</span>FIGHT
                </button>
                <button class="menu-btn" id="endless-btn" onclick="window.gameManager.startEndless()" disabled>
                    <span class="menu-btn-icon">∞</span>ENDLESS
                </button>
                <button class="menu-btn" onclick="window.gameManager.showAbilities()">
                    <span class="menu-btn-icon">⚡</span>ABILITIES
                </button>
                <button class="menu-btn" onclick="alert('Thanks for playing!'); window.location.reload()">
                    <span class="menu-btn-icon">✕</span>QUIT
                </button>
            </div>

            <!-- Overlay Panel -->
            <div id="overlay-panel">
                <div id="overlay-content"></div>
            </div>
        </div>
    </div>

    <script src="game-config.js"></script>
    <script src="player.js"></script>
    <script src="enemy.js"></script>
    <script src="boss.js"></script>
    <script src="particles.js"></script>
    <script src="abilities.js"></script>
    <script src="renderer.js"></script>
    <script src="game-manager.js"></script>
    <script src="main.js"></script>
</body>
</html>
